; ================================================================================
; إعدادات PHP لرفع الفيديوهات - ExpEdu
; ================================================================================
; هذا الملف يزيد حدود الرفع تلقائياً
; ================================================================================

; حد أقصى لحجم الملف المرفوع
upload_max_filesize = 500M

; حد أقصى لحجم البيانات المرسلة عبر POST
post_max_size = 500M

; حد الذاكرة
memory_limit = 512M

; وقت تنفيذ السكريبت (5 دقائق)
max_execution_time = 300

; وقت إدخال البيانات (5 دقائق)
max_input_time = 300

; عدد الملفات المسموح رفعها دفعة واحدة
max_file_uploads = 20

; ================================================================================
; ملاحظات:
; ================================================================================
; - هذا الملف يُطبّق على جميع ملفات PHP في هذا المجلد والمجلدات الفرعية
; - PHP يقرأ هذا الملف كل 5 دقائق
; - إذا لم يعمل، استخدم .htaccess أو اتصل بالدعم الفني
; ================================================================================

